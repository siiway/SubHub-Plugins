name: Release

on:
  push:
    branches:
      - main

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 用 Bun 做安装/构建。发布走 OIDC Trusted Publishing，无需 npm token；
      # 因此这里不再设置 registry-url（不写入 .npmrc authToken），避免干扰 OIDC。
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      # OIDC Trusted Publishing 需要 npm >= 11.5.1
      - name: Update npm for trusted publishing
        run: npm install -g npm@latest

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build all packages
        run: bun run build

      # 无 NPM_TOKEN：changeset publish 底层的 npm publish 会用 GitHub OIDC
      # 向已配置 Trusted Publisher 的包做认证；provenance 也自动生成。
      - name: Create Release Pull Request or Publish to npm
        uses: changesets/action@v1
        with:
          publish: bun run release
          version: bun run version
          commit: "chore: release packages"
          title: "chore: release packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_CONFIG_PROVENANCE: "true"
